<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ESC 동아리 소개</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="image/ESC_Logo_removebg.png" type="image/png" />
    </head>
    <body>
        <header>
            <nav>
                <a href="index.html" class="logo" style="text-decoration: none">
                    <img
                        src="image/ESC_Logo_removebg.png"
                        alt="ESC 로고"
                        style="
                            height: 4rem;
                            vertical-align: middle;
                            margin-right: 0.5rem;
                        "
                    />
                </a>
                <ul>
                    <li><a href="#about">소개</a></li>
                    <li><a href="#activities">활동</a></li>
                    <li><a href="#contact">연락처</a></li>
                </ul>
            </nav>
        </header>
        <button id="theme-toggle" style="position: fixed; top: 24px; right: 24px; z-index: 1000; padding: 10px 18px; border-radius: 8px; border: none; background: var(--hansung-blue); color: var(--hansung-yellow); font-weight: bold; cursor: pointer;">라이트 모드</button>

        <main>
            <section id="about" class="hero">
                <h1>한성과학고등학교 정보과학 동아리 ESC</h1>
                <p>우리는 정보과학의 미래를 만들어갑니다.</p>
            </section>

            <section id="activities" class="content">
                <h2>활동</h2>
                <div class="cards">
                    <div class="card">
                        <h3>알고리즘</h3>
                        <p>다양한 알고리즘 문제를 풀며 실력을 키웁니다.</p>
                    </div>
                    <div class="card">
                        <h3>개발 프로젝트</h3>
                        <p>협력하여 소프트웨어 프로젝트를 진행합니다.</p>
                    </div>
                    <div class="card">
                        <h3>대회 참여</h3>
                        <p>정보올림피아드 등 다양한 경진대회에 도전합니다.</p>
                    </div>
                </div>
            </section>

            <div style="height: 40px; background: var(--hansung-blue)"></div>
            <!-- 활동과 언어 소개 사이에 여백 추가 -->

            <section id="members" class="content">
                <h2>ESC 멤버 소개</h2>
                <div class="cards">
                    <div class="card">
                        <h3>김동현</h3>
                        <p>ESC 짱</p>
                    </div>
                    <div class="card">
                        <h3>장우주</h3>
                        <p>ESC 부짱</p>
                    </div>
                </div>
            </section>

            <div style="height: 40px; background: var(--hansung-blue)"></div>
            <!-- 멤버 소개와 언어 소개 사이에 여백 추가 -->

            <section id="skills" class="content">
                <h2>다룰 수 있는 프로그래밍 언어</h2>
                <div style="display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; align-items: center; margin-bottom: 24px;">
                    <img src="https://skillicons.dev/icons?i=python" alt="Python" title="Python" style="height:64px;"/>
                    <img src="https://skillicons.dev/icons?i=java" alt="Java" title="Java" style="height:64px;"/>
                    <img src="https://skillicons.dev/icons?i=cpp" alt="C++" title="C++" style="height:64px;"/>
                    <img src="https://skillicons.dev/icons?i=javascript" alt="JavaScript" title="JavaScript" style="height:64px;"/>
                </div>
            </section>

            <section id="contact" class="footer">
                <h2>연락처</h2>
                <p>Email: esc@example.com</p>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
